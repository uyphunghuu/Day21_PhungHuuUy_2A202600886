name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
          echo "CLOUD_BUCKET=${{ secrets.CLOUD_BUCKET }}" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/train_phase2.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          from google.cloud import storage
          import os
          bucket_name = os.environ.get("CLOUD_BUCKET")
          if not bucket_name:
              raise EnvironmentError(
                  "CLOUD_BUCKET is not set. "
                  "Please add CLOUD_BUCKET as a GitHub Secret in: "
                  "Settings → Secrets and variables → Actions."
              )
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to GCS bucket: {bucket_name}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}

          debug: true
          script_stop: false

          script: |
            set -x

            echo "===== WHOAMI ====="
            whoami

            echo "===== PWD ====="
            pwd

            echo "===== RESTART ====="
            sudo systemctl restart mlops-serve
            echo "Restart exit code: $?"

            echo "===== STATUS ====="
            sudo systemctl status mlops-serve --no-pager
            echo "Status exit code: $?"

            echo "===== WAIT ====="
            sleep 5

            echo "===== HEALTH ====="
            curl -v http://localhost:8000/health
            echo "Curl exit code: $?"

            echo "===== FINISHED ====="